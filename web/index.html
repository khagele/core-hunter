<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>core-hunter — analysis</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Installable (#194): manifest only, no service worker (no offline caching --
       this is an online analysis tool that always needs the server/API). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <script type="module">
    import { VERSION } from './version.js'
    const v = '?v=' + VERSION
    const css = document.createElement('link')
    css.rel = 'stylesheet'; css.href = 'style.css' + v
    document.head.appendChild(css)
    for (const src of ['filters.js', 'map.js']) {
      const s = document.createElement('script')
      s.type = 'module'; s.src = src + v
      document.body.appendChild(s)
    }
  </script>
    <!-- Matomo (self-hosted, cookieless; production hosts only) -->
    <script>
      if (location.hostname === 'mesh-hunter.eu' || location.hostname.endsWith('.mesh-hunter.eu')) {
        var _paq = window._paq = window._paq || [];
        _paq.push(['disableCookies']);
        _paq.push(['setDomains', ['*.mesh-hunter.eu']]);
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function() {
          var u="https://analytics.fiten.eu/";
          _paq.push(['setTrackerUrl', u+'matomo.php']);
          _paq.push(['setSiteId', '10']);
          var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
          g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
        })();
      }
    </script>
    <!-- End Matomo Code -->
</head>
<body>
  <header id="bar">
    <select id="f-hunter"><option value="">All hunters</option></select>
    <input id="f-sender" type="text" placeholder="sender id (prefix)" />
    <label>from <input id="f-from" type="datetime-local" /></label>
    <label>to <input id="f-to" type="datetime-local" /></label>
    <span id="f-types"></span>
    <label class="cs-cb"><input type="checkbox" id="f-direct" /> Direct only</label>
    <button id="layer-toggle">points</button>
    <button id="locate-toggle">Locate</button>
    <span class="cs-layer-toggle">
      <label class="cs-cb"><input type="checkbox" id="cs-adverts" /> CS adverts</label>
      <label class="cs-cb"><input type="checkbox" id="cs-relays" /> CS relays</label>
    </span>
    <button id="clear-filters" title="Clear all filters">Clear</button>
    <button id="theme-toggle" title="Toggle light/dark">🌙</button>
    <button id="auth-btn" class="bar-btn">Log in</button>
    <span id="guest-notice" class="guest-notice" hidden></span>
    <span id="status"></span>
    <span id="sf-counts"></span>
    <span id="ch-version"></span>
  </header>
  <div id="locate-info" hidden></div>
  <div id="login-modal" class="lc-modal" hidden>
    <form id="login-form" class="lc-card">
      <h4>Log in</h4>
      <input id="login-user" type="text" placeholder="Username" autocomplete="username" />
      <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" />
      <label class="lc-remember"><input id="login-remember" type="checkbox" /> Remember me</label>
      <p id="login-error" class="lc-warn" hidden>Login failed.</p>
      <div class="lc-actions">
        <button id="login-submit" type="submit">Log in</button>
        <button id="login-cancel" type="button">Cancel</button>
      </div>
    </form>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { VERSION } from './version.js';
    import { API_BASE } from './config.js';
    const el = document.getElementById('ch-version');
    el.textContent = 'web v' + VERSION;
    fetch(`${API_BASE}/api/version`)
      .then((r) => r.json())
      .then((d) => { if (d.server) el.textContent = `web v${VERSION} · srv v${d.server}`; })
      .catch(() => {});
  </script>
  <script type="module">
    import { nodeCountsText } from './nodecounts.js';
    nodeCountsText()
      .then((t) => { if (t) document.getElementById('sf-counts').textContent = t; })
      .catch(() => {});
  </script>
</body>
</html>
