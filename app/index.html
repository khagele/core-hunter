<!doctype html>
<html lang="en" data-theme="dark" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <title>Mesh-Hunter</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hunter" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/app.css" />
    <!-- Matomo (self-hosted, cookieless; production hosts only) -->
    <script>
      if (location.hostname === 'mesh-hunter.eu' || location.hostname.endsWith('.mesh-hunter.eu')) {
        var _paq = window._paq = window._paq || [];
        _paq.push(['disableCookies']);
        _paq.push(['setDomains', ['*.mesh-hunter.eu']]);
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function() {
          var u="https://analytics.fiten.eu/";
          _paq.push(['setTrackerUrl', u+'matomo.php']);
          _paq.push(['setSiteId', '10']);
          var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
          g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
        })();
      }
    </script>
    <!-- End Matomo Code -->
</head>
<body>
  <div id="map"></div>
  <header id="topbar">
    <div id="topbar-left">
      <div id="topbar-controls" role="group" aria-label="Target, filters and locate">
        <button id="target-chip" aria-haspopup="true" aria-expanded="false">Select target</button>
        <button id="filter-pill" aria-label="Filters" aria-haspopup="true" aria-expanded="false">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
            <polygon points="2,3 18,3 12,11 12,18 8,16 8,11"/>
          </svg>
          <span class="filter-pill-label">Filters</span>
          <svg class="filter-pill-caret" width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 8l4 4 4-4"/>
          </svg>
        </button>
        <label id="locate-seg">
          <input type="checkbox" id="locate-checkbox" />
          <span>Locate</span>
        </label>
      </div>
    </div>
    <div id="topbar-right">
      <span id="status-dots" role="img" aria-label="Connection status">
        <i id="dot-ble" title="BLE"></i>
        <i id="dot-mqtt" title="MQTT"></i>
      </span>
      <button id="onboarding-btn" class="topbar-btn" aria-label="How it works">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7.4 7.6a2.6 2.6 0 1 1 3.5 2.4c-.9.4-1.5 1-1.5 2.1"/>
          <circle cx="10" cy="15.4" r="0.7" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="settings-btn" class="topbar-btn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <path d="M3 6h14M3 10h14M3 14h14"/>
        </svg>
      </button>
    </div>
  </header>
  <div id="locate-info" class="locate-info" hidden></div>
  <div id="rx-log" aria-label="Receptions"></div>
  <section id="hud">
    <div id="hud-readout-row">
      <div id="hud-rssi">—</div>
      <div id="hud-snr">—</div>
      <div id="hud-since" title="Time since last packet">—</div>
    </div>
    <div id="hud-bar">
      <div id="hud-bar-fill"></div>
      <div id="hud-bar-marker"></div>
    </div>
    <div id="hud-bar-labels">
      <span>COLDER · WEAK</span>
      <span>WARMER · CLOSE</span>
    </div>
  </section>
  <button id="layer-toggle" aria-label="Toggle layers"></button>
  <button id="discover-btn" aria-label="Discover" disabled>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
      <circle cx="10" cy="10" r="1.6" fill="currentColor" stroke="none"/>
      <path d="M13 7a4.2 4.2 0 0 1 0 6"/>
      <path d="M15.6 4.6a8 8 0 0 1 0 10.8"/>
      <path d="M7 13a4.2 4.2 0 0 1 0-6"/>
      <path d="M4.4 15.4a8 8 0 0 1 0-10.8"/>
    </svg>
  </button>
  <button id="recenter-btn" aria-label="Compass mode"></button>
  <aside id="filter-sheet" hidden></aside>
  <aside id="settings-sheet" hidden></aside>
  <aside id="target-sheet" hidden></aside>
  <aside id="splash">
    <div class="splash-callout co-controls" id="co-controls"></div>
    <div class="splash-callout co-menu" id="co-menu"></div>
    <div class="splash-callout co-fabs" id="co-fabs"></div>
    <div class="splash-panel">
      <div class="splash-brand">
        <span class="splash-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="2.6"/><path d="M10 10l5-3.2"/>
          </svg>
        </span>
        <h1 id="splash-name">Mesh-Hunter</h1>
      </div>
      <ul id="splash-basics" class="splash-basics"></ul>
      <p id="splash-disclaimer" class="splash-disclaimer"></p>
      <p id="splash-status" class="splash-status"></p>
      <button type="button" id="splash-retry-gps" class="splash-retry" hidden>Retry location</button>
    </div>
    <button type="button" id="splash-close" class="splash-close" aria-label="Close" hidden>
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <path d="M5 5l10 10M15 5L5 15"/>
      </svg>
    </button>
    <button type="button" id="connect-btn" class="splash-connect">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 6.2l6 7.6-3 2.4V3.8l3 2.4-6 7.6"/>
      </svg>
      <span>Connect to MeshCore companion</span>
    </button>
  </aside>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
