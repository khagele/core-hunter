<!doctype html>
<html lang="en" data-theme="dark" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <title>core-hunter</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hunter" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body>
  <div id="map"></div>
  <header id="topbar">
    <span id="target-chip">No target</span>
    <div id="topbar-right">
      <span id="status-dots">
        <i id="dot-ble"></i><span class="dot-label">BLE</span>
        <i id="dot-mqtt"></i><span class="dot-label">MQTT</span>
      </span>
      <button id="settings-btn" class="topbar-btn" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <circle cx="10" cy="10" r="3"/>
          <path d="M10 2v2.4M10 15.6V18M18 10h-2.4M4.4 10H2M15.5 4.5l-1.7 1.7M6.2 13.8l-1.7 1.7M15.5 15.5l-1.7-1.7M6.2 6.2L4.5 4.5"/>
        </svg>
      </button>
    </div>
  </header>
  <div id="locate-info" class="locate-info" hidden></div>
  <section id="feed-panel" class="collapsed">
    <button id="feed-handle" type="button">▲ Messages <span id="feed-count">(0)</span></button>
    <ul id="feed-list"></ul>
  </section>
  <section id="hud">
    <div id="hud-readout-row">
      <div id="hud-rssi">—</div>
      <div id="hud-snr">—</div>
      <div id="hud-since" title="Time since last packet">—</div>
    </div>
    <div id="hud-bar">
      <div id="hud-bar-fill"></div>
      <div id="hud-bar-marker"></div>
    </div>
    <div id="hud-bar-labels">
      <span>COLDER · WEAK</span>
      <span>WARMER · CLOSE</span>
    </div>
    <div id="hud-btn-row">
      <button id="connect-btn">Connect</button>
    </div>
  </section>
  <button id="layer-toggle" aria-label="Toggle layers"></button>
  <button id="filter-btn" aria-label="Filters">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
      <polygon points="2,3 18,3 12,11 12,18 8,16 8,11"/>
    </svg>
  </button>
  <button id="discover-btn" aria-label="Discover" disabled>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
      <circle cx="10" cy="10" r="1.6" fill="currentColor" stroke="none"/>
      <path d="M13 7a4.2 4.2 0 0 1 0 6"/>
      <path d="M15.6 4.6a8 8 0 0 1 0 10.8"/>
      <path d="M7 13a4.2 4.2 0 0 1 0-6"/>
      <path d="M4.4 15.4a8 8 0 0 1 0-10.8"/>
    </svg>
  </button>
  <button id="recenter-btn" aria-label="Compass mode"></button>
  <button id="locate-toggle-btn" class="active" aria-label="Toggle locate overlay" hidden>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
      <circle cx="10" cy="10" r="7"/>
      <circle cx="10" cy="10" r="3.2"/>
      <circle cx="10" cy="10" r="0.9" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <aside id="filter-sheet" hidden></aside>
  <aside id="settings-sheet" hidden></aside>
  <aside id="target-sheet" hidden></aside>
  <aside id="splash">
    <div class="splash-inner">
      <h1>core-hunter</h1>
      <p class="splash-blurb">Search for nearby senders by signal strength — connect to your hunter,
        point your phone, and walk toward the heat.
        <a href="https://github.com/efiten/core-hunter" target="_blank" rel="noopener">Learn more on GitHub</a>.</p>
      <p id="splash-status" class="splash-status"></p>
      <p id="splash-disclaimer" class="splash-disclaimer" hidden></p>
      <p id="splash-tip" class="splash-tip" hidden></p>
      <button type="button" id="splash-retry-gps" class="splash-retry" hidden>Retry location</button>
    </div>
  </aside>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
