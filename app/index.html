<!doctype html>
<html lang="en" data-theme="dark" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <title>core-hunter</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body>
  <div id="map"></div>
  <header id="topbar">
    <span id="target-chip">No target</span>
    <div id="topbar-right">
      <span id="status-dots">
        <i id="dot-ble"></i><span class="dot-label">BLE</span>
        <i id="dot-mqtt"></i><span class="dot-label">MQTT</span>
      </span>
      <button id="settings-btn" class="topbar-btn" aria-label="Settings">⚙</button>
    </div>
  </header>
  <section id="feed-panel" class="collapsed">
    <button id="feed-handle" type="button">▲ Messages <span id="feed-count">(0)</span></button>
    <ul id="feed-list"></ul>
  </section>
  <section id="hud">
    <div id="hud-readout-row">
      <div id="hud-rssi">—</div>
      <div id="hud-snr">—</div>
      <div id="hud-since" title="Time since last packet">—</div>
    </div>
    <div id="hud-bar">
      <div id="hud-bar-fill"></div>
      <div id="hud-bar-marker"></div>
    </div>
    <div id="hud-bar-labels">
      <span>COLDER · WEAK</span>
      <span>WARMER · CLOSE</span>
    </div>
    <div id="hud-btn-row">
      <button id="connect-btn">Connect</button>
    </div>
  </section>
  <button id="layer-toggle" aria-label="Toggle layers">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
      <polygon points="10,2 18,6 10,10 2,6"/>
      <polyline points="2,10 10,14 18,10"/>
      <polyline points="2,14 10,18 18,14"/>
    </svg>
  </button>
  <button id="filter-btn" aria-label="Filters">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
      <polygon points="2,3 18,3 12,11 12,18 8,16 8,11"/>
    </svg>
  </button>
  <button id="discover-btn" aria-label="Discover" disabled>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
      <circle cx="10" cy="10" r="1.6" fill="currentColor" stroke="none"/>
      <path d="M13 7a4.2 4.2 0 0 1 0 6"/>
      <path d="M15.6 4.6a8 8 0 0 1 0 10.8"/>
      <path d="M7 13a4.2 4.2 0 0 1 0-6"/>
      <path d="M4.4 15.4a8 8 0 0 1 0-10.8"/>
    </svg>
  </button>
  <button id="recenter-btn" aria-label="Recenter on my position" hidden>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" aria-hidden="true">
      <circle cx="10" cy="10" r="4"/>
      <line x1="10" y1="1" x2="10" y2="4"/>
      <line x1="10" y1="16" x2="10" y2="19"/>
      <line x1="1" y1="10" x2="4" y2="10"/>
      <line x1="16" y1="10" x2="19" y2="10"/>
    </svg>
  </button>
  <aside id="filter-sheet" hidden></aside>
  <aside id="settings-sheet" hidden></aside>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
