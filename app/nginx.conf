# In-container nginx for the hunter PWA. The public-facing TLS vhost
# (hunter.on8ar.eu) lives on the front reverse proxy and proxies to this.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # hashed bundles never change -> cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html / sw.js / manifest / config.json must always revalidate so updates land
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
